<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meus Projetos - Tinkercad</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f6f9;
    color:#333;
}

header{
    background:#ff9800;
    color:white;
    padding:30px;
    text-align:center;
}

header h1{
    font-size:2.5em;
}

.container{
    max-width:1000px;
    margin:40px auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
    padding:20px;
}

.card{
    background:white;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
    overflow:hidden;
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card-content{
    padding:20px;
}

.card h2{
    margin-bottom:10px;
}

.card p{
    margin-bottom:20px;
}

.botao{
    display:inline-block;
    background:#ff9800;
    color:white;
    text-decoration:none;
    padding:12px 18px;
    border-radius:8px;
    transition:.3s;
}

.botao:hover{
    background:#e68900;
}

footer{
    text-align:center;
    padding:20px;
    margin-top:30px;
}
</style>

</head>
<body>

<header>
    <h1>🚀 Meus Projetos no Tinkercad</h1>
    <p>Projetos desenvolvidos por mim</p>
</header>

<div class="container">

    <div class="card">
        <img src="https://picsum.photos/400/250?1" alt="Projeto">
        <div class="card-content">
            <h2>Projeto 1</h2>
            <p>Descrição do projeto.</p>
            <a class="botao"
               href="https://www.tinkercad.com/things/SEU-LINK"
               target="_blank">
               Ver Projeto
            </a>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/400/250?2" alt="Projeto">
        <div class="card-content">
            <h2>Projeto 2</h2>
            <p>Descrição do projeto.</p>
            <a class="botao"
               href="https://www.tinkercad.com/things/SEU-LINK"
               target="_blank">
               Ver Projeto
            </a>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/400/250?3" alt="Projeto">
        <div class="card-content">
            <h2>Projeto 3</h2>
            <p>Descrição do projeto.</p>
            <a class="botao"
               href="https://www.tinkercad.com/things/SEU-LINK"
               target="_blank">
               Ver Projeto
            </a>
        </div>
    </div>

</div>

<footer>
    © 2026 - Meu Portfólio Tinkercad
</footer>

</body>
</html>
